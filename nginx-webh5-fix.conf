# ============ 修复后的 /webh5 配置 ============
# 替换你现有配置中的 location /webh5 部分
# 注意：这些配置必须按顺序放置，更具体的路径在前

# ========= 微信验证文件（必须放在最前面，优先级最高）=========
# 微信公众平台验证授权回调域名时，会访问：https://域名/MP_verify_xxxxx.txt
# 验证文件需要放在服务器根目录，确保可以通过 https 访问
# 将验证文件放到 public/ 目录，Vite 构建时会复制到 dist 根目录
location ~ ^/MP_verify_[a-zA-Z0-9]+\.txt$ {
    # 如果验证文件放在 dist 目录根目录（推荐方式：放到 public/ 目录）
    root /home/web/liaoquan-h5;
    
    # 确保返回正确的 Content-Type
    default_type text/plain;
    add_header Content-Type text/plain;
    
    # 不缓存验证文件
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    
    # 确保文件存在，不存在返回 404
    try_files $uri =404;
}

# 1. 静态资源目录（优先级最高，必须放在 SPA 路由之前）
location /webh5/assets/ {
    # 使用 alias，注意：alias 路径末尾不要加斜杠，但 location 路径末尾要加斜杠
    alias /home/web/liaoquan-h5/assets/;
    
    # 确保文件存在，不存在返回 404（不走 SPA 路由）
    try_files $uri =404;
    
    # 设置缓存
    expires 1y;
    add_header Cache-Control "public, immutable";
    
    # Nginx 会根据文件扩展名自动设置 MIME 类型
    # 如果需要强制指定，可以在下面添加
}

# 2. favicon.ico（精确匹配，优先级高）
location = /webh5/favicon.ico {
    alias /home/web/liaoquan-h5/favicon.ico;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# 2.1 图片下载同源代理（解决前端下载 CDN 图片的 CORS 问题）
# 前端会请求：/__cdn__/lq/xxx/yyy.jpg
# Nginx 转发到：https://cdn.hnstylor.cn/lq/xxx/yyy.jpg
location /__cdn__/ {
    proxy_pass https://cdn.hnstylor.cn/;
    proxy_ssl_server_name on;
    proxy_set_header Host cdn.hnstylor.cn;

    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
}

# 3. SPA 路由配置（处理所有其他请求，必须放在最后）
location /webh5 {
    # 使用 alias，直接映射到 dist 目录
    alias /home/web/liaoquan-h5/;
    
    # 默认文件
    index index.html;
    
    # 关键：只对非静态资源的请求进行 SPA 路由
    # 如果文件存在，直接返回；不存在则返回 index.html（SPA 路由）
    try_files $uri $uri/ /webh5/index.html;
    
    # 确保返回 HTML 类型
    default_type text/html;
}

# ============ 配置说明 ============
# 1. 静态资源（/webh5/assets/**）会直接返回文件，不走 SPA 路由
# 2. 其他路径（如 /webh5/home, /webh5/login）会返回 index.html，由前端路由处理
# 3. 使用 alias 而不是 root，避免路径拼接错误
# 4. 确保 /home/web/liaoquan-h5 目录下有完整的 dist 构建产物

