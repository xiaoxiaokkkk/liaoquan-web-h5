<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
    <script type="text/javascript" charset="UTF-8" src="https://wx.gtimg.com/pay_h5/goldplan/js/jgoldplan-1.0.0.js"></script>
    <title>料圈</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <style>
      :root {
        --vh: 1vh;
      }
      /* 页面根背景兜底：即便出现瞬时留白，也不显示黑底 */
      html, body {
        background-color: #f4f6f8;
      }
    </style>
    <script>
      !(function (n, e) {
        var rafId = 0
        var settleTimer = 0
        var lastHeight = 0

        function readViewportHeight() {
          var vv = e.visualViewport
          var h = vv && vv.height ? vv.height : e.innerHeight
          return h > 0 ? h : e.innerHeight
        }

        function applyViewHeight() {
          rafId = 0
          var h = readViewportHeight()
          // 忽略微小抖动，减少频繁回流
          if (Math.abs(h - lastHeight) < 0.5) return
          lastHeight = h
          n.documentElement.style.setProperty('--vh', h / 100 + 'px')
        }

        function syncViewHeight() {
          if (rafId) return
          rafId = e.requestAnimationFrame(applyViewHeight)
        }

        function settleSyncViewHeight() {
          if (settleTimer) e.clearTimeout(settleTimer)
          syncViewHeight()
          // 微信底部栏有动画过程：在动画期间做多次补偿采样，避免 --vh 滞后
          ;[120, 260, 420].forEach(function (delay) {
            e.setTimeout(syncViewHeight, delay)
          })
          settleTimer = e.setTimeout(syncViewHeight, 700)
        }

        n.addEventListener('DOMContentLoaded', settleSyncViewHeight)
        e.addEventListener('pageshow', settleSyncViewHeight)
        e.addEventListener('orientationchange', settleSyncViewHeight)
        e.addEventListener('resize', settleSyncViewHeight)
        e.addEventListener('scroll', settleSyncViewHeight, { passive: true })
        e.addEventListener('touchend', settleSyncViewHeight, { passive: true })
        n.addEventListener('visibilitychange', function () {
          if (!n.hidden) settleSyncViewHeight()
        })

        if (e.visualViewport) {
          e.visualViewport.addEventListener('resize', settleSyncViewHeight)
          e.visualViewport.addEventListener('scroll', settleSyncViewHeight)
        }

        // 提供给 SPA 在路由切换后主动触发
        e.__syncVh = settleSyncViewHeight
        settleSyncViewHeight()
      })(document, window)
    </script>
  </body>
</html>
